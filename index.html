<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISMA</title>

    <link rel="icon" type="image/png" href="PRISMA.png?v=1">
    <link rel="stylesheet" href="style.css?v=13">
</head>

<body>

<header class="topbar">

    <div class="brand-area">
        <a href="#" class="brand-logo" id="homeButton">
            <img src="prisma-logo.png" alt="PRISMA">
        </a>
    </div>

    <nav class="menu">

        <a
            href="#"
            class="menu-image personagens"
            data-normal="personagens.png?v=2"
            data-active="personagens-active.png?v=2">

            <img src="personagens.png?v=2" alt="Personagens">

        </a>

        <a
            href="#"
            class="menu-image campanhas"
            data-normal="campanhas.png?v=2"
            data-active="campanhas-active.png?v=2">

            <img src="campanhas.png?v=2" alt="Campanhas">

        </a>
        
        <a
            href="#"
            class="menu-image sistema"
            data-normal="sistema.png?v=2"
            data-active="sistema-active.png?v=2">

            <img src="sistema.png?v=2" alt="Sistema">

        </a>
        
    </nav>

    <div class="profile"></div>

</header>

<div class="line"></div>

<main class="hero">

    <img class="bg-tree" id="bgTree" src="deltarune-tree.gif?v=1" alt="">

    <div class="leaf-layer" id="leafLayer"></div>

    <section class="home-text">
        <h1 id="typeText"></h1>
    </section>

</main>

<audio id="selectSound" src="sndselectundertale.mp3"></audio>
<audio id="homeSound" src="snd_saveprisma.mp3"></audio>

<script>

const buttons = document.querySelectorAll(".menu-image");

const selectSound = document.getElementById("selectSound");
const homeSound = document.getElementById("homeSound");

selectSound.volume = 0.25;
homeSound.volume = 0.25;

const homeButton = document.getElementById("homeButton");

const typeText = document.getElementById("typeText");

const initialTypeDelay = 350;

const homeMessage = [
    {
        text: "Tá tão...",
        speed: 35,
        effect: "normal",
        pauseAfter: 1000
    },

    {
        text: " fri",
        speed: 120,
        effect: "cold",
    },

    {
        text: "o",
        speed: 90,
        effect: "cold",
    },
    
    {
        text: ".\n\n",
        speed: 70,
        effect: "normal",
        pauseAfter: 500
    },

    {
        text: "...\n\n",
        speed: 330,
        effect: "normal",
        pauseAfter: 1000
    },

    {
        text: "Já já vai começar de novo.\n\n",
        speed: 35,
        effect: "normal",
        pauseAfter: 700
    },

    {
        text: "...\n\n",
        speed: 330,
        effect: "normal",
        pauseAfter: 1000
    },

    {
        text: "Eu vou pegar um casaco.\n\n",
        speed: 35,
        effect: "normal",
        pauseAfter: 400
    },

    {
        text: "Você quer vir comigo?",
        speed: 35,
        effect: "normal"
    }
];

let typingRun = 0;

function wait(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function startTypewriter(){

    typingRun++;
    const currentRun = typingRun;

    typeText.innerHTML = "";

    await wait(initialTypeDelay);

    if(currentRun !== typingRun) return;

    for(const block of homeMessage){

        if(currentRun !== typingRun) return;

        if(block.pauseBefore){
            await wait(block.pauseBefore);
        }

        for(const char of block.text){

            if(currentRun !== typingRun) return;

            if(char === "\n"){
                typeText.appendChild(document.createElement("br"));
            }else{
                const letter = document.createElement("span");

                letter.classList.add("typed-letter");
                letter.classList.add(block.effect || "normal");

                if(char === " "){
                    letter.innerHTML = "&nbsp;";
                }else{
                    letter.textContent = char;
                }

                typeText.appendChild(letter);
            }

            await wait(block.speed || 45);
        }

        if(block.pauseAfter){
            await wait(block.pauseAfter);
        }
    }
}

startTypewriter();

buttons.forEach(button => {

    button.addEventListener("click", function(e){

        e.preventDefault();

        selectSound.currentTime = 0;
        selectSound.play();

        buttons.forEach(item => {

            item.classList.remove("active");

            item.querySelector("img").src = item.dataset.normal;

        });

        this.classList.add("active");

        this.querySelector("img").src = this.dataset.active;

    });

});

homeButton.addEventListener("click", function(e){

    e.preventDefault();

    homeSound.currentTime = 0;
    homeSound.play();

    buttons.forEach(item => {

        item.classList.remove("active");

        item.querySelector("img").src = item.dataset.normal;

    });

    startTypewriter();

});

/* FOLHAS CAINDO */

const hero = document.querySelector(".hero");
const bgTree = document.getElementById("bgTree");
const leafLayer = document.getElementById("leafLayer");

function randomBetween(min, max){
    return Math.random() * (max - min) + min;
}

function dropLeaf(){

    const heroRect = hero.getBoundingClientRect();
    const treeRect = bgTree.getBoundingClientRect();

    const leaf = document.createElement("img");

    leaf.classList.add("falling-leaf");
    leaf.src = "folhaprisma.png?v=1";
    leaf.alt = "";

    const startX = randomBetween(
        treeRect.left + treeRect.width * 0.20,
        treeRect.left + treeRect.width * 0.80
    );

    const startY = randomBetween(
        treeRect.top + treeRect.height * 0.05,
        treeRect.top + treeRect.height * 0.32
    );

    const fallDistance = randomBetween(120, 210);
    const drift = randomBetween(-35, 35);
    const rotation = randomBetween(-25, 25);
    const duration = randomBetween(2600, 3600);

    leaf.style.left = `${startX - heroRect.left}px`;
    leaf.style.top = `${startY - heroRect.top}px`;

    leaf.style.setProperty("--fall-distance", `${fallDistance}px`);
    leaf.style.setProperty("--leaf-drift", `${drift}px`);
    leaf.style.setProperty("--leaf-rotation", `${rotation}deg`);
    leaf.style.setProperty("--leaf-duration", `${duration}ms`);

    leafLayer.appendChild(leaf);

    setTimeout(() => {
        leaf.remove();
    }, duration + 200);
}

setInterval(dropLeaf, 3500);

</script>

</body>
</html>
