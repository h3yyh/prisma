<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRISMA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">

    <div class="brand-area">
      <a href="#" class="brand-logo" id="homeButton">
        <img src="prisma-logo.png" alt="PRISMA">
      </a>
    </div>

    <nav class="menu">

      <a href="#" class="menu-image active" data-normal="personagens(1).png" data-active="personagens-active(1).png">
        <img src="personagens-active(1).png" alt="Personagens">
      </a>

      <a href="#" class="menu-image" data-normal="campanhas(1).png" data-active="campanhas-active.jpg">
        <img src="campanhas(1).png" alt="Campanhas">
      </a>

      <a href="#" class="menu-image" data-normal="sistema.jpg" data-active="sistema-active(1).png">
        <img src="sistema.jpg" alt="Sistema">
      </a>

    </nav>

    <div class="profile"></div>

  </header>

  <div class="line"></div>

  <main class="hero"></main>

  <audio id="selectSound" src="sndselectundertale.mp3"></audio>
  <audio id="homeSound" src="snd_saveprisma.mp3"></audio>

  <script>
    const buttons = document.querySelectorAll(".menu-image");
    const selectSound = document.getElementById("selectSound");
    const homeSound = document.getElementById("homeSound");
    const homeButton = document.getElementById("homeButton");

    selectSound.volume = 0.25;
    homeSound.volume = 0.25;

    buttons.forEach(button => {
      button.addEventListener("click", function(event){
        event.preventDefault();

        selectSound.currentTime = 0;
        selectSound.play();

        buttons.forEach(item => {
          item.classList.remove("active");
          item.querySelector("img").src = item.dataset.normal;
        });

        this.classList.add("active");
        this.querySelector("img").src = this.dataset.active;
      });
    });

    homeButton.addEventListener("click", function(event){
      event.preventDefault();

      homeSound.currentTime = 0;
      homeSound.play();

      buttons.forEach(item => {
        item.classList.remove("active");
        item.querySelector("img").src = item.dataset.normal;
      });
    });
  </script>

</body>
</html>
