<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>PRISMA</title>
    <link rel="icon" type="image/png" href="PRISMA.png?v=1">
    <link rel="stylesheet" href="style.css?v=28">
</head>
<body>
    <div class="start-screen" id="startScreen">
        <button class="start-logo-button" id="startButton" type="button" aria-label="Entrar no Prisma">
            <img src="prisma-logo.png" alt="PRISMA">
        </button>
    </div>

    <div class="header-wrap" id="headerWrap">
        <header class="topbar">
            <div class="brand-area">
                <a class="brand-logo" id="homeButton" href="#" aria-label="Voltar ao início">
                    <img src="prisma-logo.png" alt="PRISMA">
                </a>
            </div>

            <nav class="menu" aria-label="Menu principal">
                <a class="menu-image personagens" href="#" data-normal="personagens.png?v=2" data-active="personagens-active.png?v=2">
                    <img src="personagens.png?v=2" alt="Personagens">
                </a>

                <a class="menu-image campanhas" href="#" data-normal="campanhas.png?v=2" data-active="campanhas-active.png?v=2">
                    <img src="campanhas.png?v=2" alt="Campanhas">
                </a>

                <a class="menu-image sistema" href="#" data-normal="sistema.png?v=2" data-active="sistema-active.png?v=2">
                    <img src="sistema.png?v=2" alt="Sistema">
                </a>
            </nav>

            <button class="profile" id="profileButton" type="button" aria-label="Abrir perfil" aria-controls="profileOverlay" aria-expanded="false">
                <img class="profile-photo" src="perfilfotoprisma.png?v=1" alt="">
                <img class="profile-frame" src="perfilprisma.png?v=1" alt="">
            </button>
        </header>

        <div class="line"></div>
    </div>

    <main class="hero">
        <div class="sky-leaf-layer" id="skyLeafLayer"></div>
        <img class="bg-tree" id="bgTree" src="deltarune-tree.gif?v=1" alt="">
        <div class="tree-leaf-layer" id="treeLeafLayer"></div>

        <section class="home-text">
            <h1 id="typeText"></h1>
        </section>
    </main>

    <div class="profile-overlay" id="profileOverlay" aria-hidden="true">
        <section class="profile-panel" role="dialog" aria-modal="true" aria-labelledby="profileTitle">
            <button class="profile-close" id="profileClose" type="button" aria-label="Fechar perfil">X</button>
            <h2 id="profileTitle">PERFIL</h2>

            <div class="profile-panel-user">
                <div class="profile-panel-avatar">
                    <img class="profile-photo" src="perfilfotoprisma.png?v=1" alt="">
                    <img class="profile-frame" src="perfilprisma.png?v=1" alt="">
                </div>

                <div>
                    <h3>USUÁRIO</h3>
                    <p>Este espaço poderá mostrar o nome e a descrição do perfil.</p>
                </div>
            </div>

            <div class="profile-panel-info">
                <p><span>STATUS</span> EM DESENVOLVIMENTO</p>
                <p><span>CAMPANHAS</span> 0</p>
                <p><span>PERSONAGENS</span> 0</p>
            </div>

            <div class="profile-volume">
                <div class="profile-volume-label">
                    <span>VOLUME</span>
                    <output id="volumeValue">35%</output>
                </div>

                <div class="volume-slider" id="volumeSlider" role="slider" tabindex="0" aria-label="Volume da música" aria-valuemin="0" aria-valuemax="100" aria-valuenow="35">
                    <div class="volume-track" id="volumeTrack">
                        <img class="volume-bar volume-normal" src="abaixarvolumep.png" alt="" draggable="false">
                        <img class="volume-bar volume-selected" src="abaixarvolume-select.png" alt="" draggable="false">

                        <div class="volume-fill-mask">
                            <img class="volume-bar volume-normal" src="aumentarvolumep.png" alt="" draggable="false">
                            <img class="volume-bar volume-selected" src="aumentarvolume-select.png" alt="" draggable="false">
                        </div>
                    </div>

                    <img class="volume-knob volume-normal" src="botãovolume.png" alt="" draggable="false">
                    <img class="volume-knob volume-selected" src="botãovolume-select.png" alt="" draggable="false">
                </div>
            </div>
        </section>
    </div>

    <audio id="selectSound" src="sndselectundertale.mp3"></audio>
    <audio id="homeSound" src="snd_saveprisma.mp3"></audio>
    <audio id="openSound" src="prismabrindo.mp3"></audio>
    <audio id="bgMusic" src="conexãoprisma.mp3" loop preload="auto"></audio>

    <script>
        const $ = id => document.getElementById(id);
        const startScreen = $("startScreen");
        const startButton = $("startButton");
        const headerWrap = $("headerWrap");
        const homeButton = $("homeButton");
        const typeText = $("typeText");
        const profileButton = $("profileButton");
        const profileOverlay = $("profileOverlay");
        const profileClose = $("profileClose");
        const selectSound = $("selectSound");
        const homeSound = $("homeSound");
        const openSound = $("openSound");
        const bgMusic = $("bgMusic");
        const volumeSlider = $("volumeSlider");
        const volumeTrack = $("volumeTrack");
        const volumeValue = $("volumeValue");
        const skyLeafLayer = $("skyLeafLayer");
        const treeLeafLayer = $("treeLeafLayer");
        const bgTree = $("bgTree");
        const hero = document.querySelector(".hero");
        const buttons = document.querySelectorAll(".menu-image");

        const DROP_TIME = 14.582;
        const TEXT_PREPARE_TIME = .12;
        const INITIAL_VOLUME = 35;
        const SKY_LEAF_COUNT = 14;
        const SKY_LANES = 7;
        const skyLeafSprites = ["folha1.png","folha2.png","folha3.png","folha4.png"];

        let typingRun = 0;
        let currentLine;
        let musicStarted = false;
        let dropStarted = false;
        let textPrepared = false;
        let musicIndex = 0;
        let musicClockStart = 0;
        let textFrame = 0;
        let syncFrame = 0;
        let treeLeafTimer = 0;
        let treeLeafDelay = 0;
        let volumePercent = INITIAL_VOLUME;
        let draggingVolume = false;
        let lastFocusedElement;
        let pendingPlayingHandler;
        const preloadImages = [];

        selectSound.volume = .25;
        homeSound.volume = .25;
        openSound.volume = .35;

        const musicBlocks = [
            {text:"rio",speed:95,effect:"cold"},
            {text:".\n\n",speed:70,pause:500},
            {text:"...\n\n",speed:330,pause:1000},
            {text:"Já já vai começar de novo.\n\n",speed:35,pause:700},
            {text:"...\n\n",speed:330,pause:1000},
            {text:"Eu vou pegar um casaco.\n\n",speed:35,pause:400},
            {text:"Você quer vir comigo?",speed:35}
        ];

        function createTimeline(){
            const target = (DROP_TIME - TEXT_PREPARE_TIME) * 1000;
            const characterTime = musicBlocks.reduce((sum,block) => sum + block.text.length * block.speed,0);
            const pauseTime = musicBlocks.reduce((sum,block) => sum + (block.pause || 0),0);
            const pauseScale = Math.max(0,(target - characterTime) / pauseTime);
            const events = [];
            let time = 0;

            for(const block of musicBlocks){
                for(const char of block.text){
                    time += block.speed;
                    events.push({time,char,effect:block.effect || "normal"});
                }

                time += (block.pause || 0) * pauseScale;
            }

            return events;
        }

        const musicEvents = createTimeline();
        const wait = ms => new Promise(resolve => setTimeout(resolve,ms));
        const random = (min,max) => Math.random() * (max - min) + min;
        const clamp = (value,min,max) => Math.max(min,Math.min(max,value));

        function preloadVisuals(){
            bgTree.decode?.().catch(() => {});

            for(const source of [...skyLeafSprites,"folhaprisma.png?v=1"]){
                const image = new Image();

                image.src = source;
                image.decode?.().catch(() => {});
                preloadImages.push(image);
            }
        }

        function createTextLine(){
            currentLine = document.createElement("span");
            currentLine.className = "typed-line";
            typeText.appendChild(currentLine);
        }

        function resetText(){
            typeText.replaceChildren();
            createTextLine();
        }

        function appendCharacter(char,effect="normal"){
            if(char === "\n"){
                createTextLine();
                return null;
            }

            const letter = document.createElement("span");

            letter.className = `typed-letter ${effect}`;
            letter.textContent = char === " " ? "\u00a0" : char;
            currentLine.appendChild(letter);

            return letter;
        }

        function playSound(sound){
            sound.currentTime = 0;
            sound.play().catch(() => {});
        }

        async function beginExperience(){
            if(document.body.classList.contains("started")) return;

            startButton.disabled = true;
            playSound(openSound);
            preloadVisuals();

            bgMusic.volume = 0;

            try{
                bgMusic.currentTime = 0;
                await bgMusic.play();
                bgMusic.pause();
                bgMusic.currentTime = 0;
            }catch{}

            document.body.classList.add("started");
            startScreen.classList.add("leaving");
            setTimeout(() => startScreen.remove(),400);
        }

        startButton.addEventListener("click",beginExperience);

        headerWrap.addEventListener("animationend",event => {
            if(event.target !== headerWrap || event.animationName !== "headerDrop") return;

            headerWrap.classList.add("ready");
            setTimeout(startHomeSequence,1000);
        });

        function stopCurrentSequence(){
            typingRun++;
            musicStarted = false;
            dropStarted = false;
            textPrepared = false;
            musicIndex = 0;
            musicClockStart = 0;

            cancelAnimationFrame(textFrame);
            cancelAnimationFrame(syncFrame);
            clearInterval(treeLeafTimer);
            clearTimeout(treeLeafDelay);

            if(pendingPlayingHandler){
                bgMusic.removeEventListener("playing",pendingPlayingHandler);
                pendingPlayingHandler = null;
            }

            document.body.classList.remove("drop-live");
            skyLeafLayer.replaceChildren();
            treeLeafLayer.replaceChildren();

            bgMusic.pause();
            bgMusic.volume = 0;

            try{
                bgMusic.currentTime = 0;
            }catch{}
        }

        function startHomeSequence(){
            stopCurrentSequence();
            prepareSkyLeaves();
            typePrelude(typingRun);
        }

        async function typePrelude(run){
            const audioReady = prepareMusic();

            resetText();

            for(const char of "Tá tão..."){
                if(run !== typingRun) return;

                appendCharacter(char);
                await wait(35);
            }

            await wait(1000);

            if(run !== typingRun) return;

            appendCharacter(" ");
            await wait(120);
            await audioReady;

            if(run === typingRun) startMusicSequence(run);
        }

        function waitForAudio(eventName,timeout=1000){
            return new Promise(resolve => {
                let finished = false;

                const finish = () => {
                    if(finished) return;

                    finished = true;
                    clearTimeout(timer);
                    bgMusic.removeEventListener(eventName,finish);
                    resolve();
                };

                const timer = setTimeout(finish,timeout);
                bgMusic.addEventListener(eventName,finish,{once:true});
            });
        }

        async function prepareMusic(){
            bgMusic.pause();
            bgMusic.volume = 0;

            if(bgMusic.readyState < 1){
                await waitForAudio("loadedmetadata",1500);
            }

            try{
                bgMusic.currentTime = 0;
            }catch{}

            if(bgMusic.seeking){
                await waitForAudio("seeked");
            }
        }

        async function startMusicSequence(run){
            if(run !== typingRun) return;

            const f = appendCharacter("f","cold sync-f");

            bgMusic.volume = 0;

            pendingPlayingHandler = () => {
                pendingPlayingHandler = null;

                syncFrame = requestAnimationFrame(() => {
                    if(run !== typingRun) return;

                    f.classList.add("visible");
                    bgMusic.volume = volumePercent / 100;

                    musicStarted = true;
                    musicIndex = 0;
                    musicClockStart = bgMusic.currentTime;

                    renderMusicText(run);
                });
            };

            bgMusic.addEventListener("playing",pendingPlayingHandler,{once:true});

            try{
                await bgMusic.play();
            }catch{
                bgMusic.removeEventListener("playing",pendingPlayingHandler);
                pendingPlayingHandler = null;
                f.remove();
            }
        }

        function renderMusicText(run){
            if(!musicStarted || run !== typingRun) return;

            const elapsed = (bgMusic.currentTime - musicClockStart) * 1000;

            while(musicIndex < musicEvents.length && musicEvents[musicIndex].time <= elapsed){
                const event = musicEvents[musicIndex++];

                appendCharacter(event.char,event.effect);
            }

            if(!textPrepared && musicIndex === musicEvents.length){
                textPrepared = true;
                prepareTextSlide();
            }

            if(!dropStarted && elapsed >= DROP_TIME * 1000){
                triggerDrop();
            }

            if(!dropStarted){
                textFrame = requestAnimationFrame(() => renderMusicText(run));
            }
        }

        function prepareTextSlide(){
            const availableWidth = typeText.clientWidth;

            for(const line of typeText.querySelectorAll(".typed-line")){
                const distance = Math.max(0,(availableWidth - line.offsetWidth) / 2);

                line.style.setProperty("--slide-x",`${distance}px`);
            }
        }

        function triggerDrop(){
            if(dropStarted) return;

            dropStarted = true;
            document.body.classList.add("drop-live");

            treeLeafDelay = setTimeout(dropTreeLeaf,120);
            treeLeafTimer = setInterval(dropTreeLeaf,3500);
        }

        function prepareSkyLeaves(){
            const width = hero.clientWidth;
            const height = hero.clientHeight;
            const laneWidth = width / SKY_LANES;
            const fragment = document.createDocumentFragment();

            for(let index = 0;index < SKY_LEAF_COUNT;index++){
                const leaf = new Image();
                const lane = index % SKY_LANES;
                const size = random(14,22);
                const startX = clamp(
                    lane * laneWidth + random(laneWidth * .15,laneWidth * .85),
                    0,
                    width - size
                );

                const startY = -size - random(15,160);
                const wantedLeft = width * random(.08,.2);
                const moveX = -Math.min(wantedLeft,startX + size * .7);
                const moveY = height + size + random(60,140) - startY;
                const duration = moveY / random(85,115);
                const angle = random(-30,30);

                leaf.className = "sky-leaf";
                leaf.src = skyLeafSprites[index % skyLeafSprites.length];
                leaf.alt = "";
                leaf.style.width = `${size}px`;
                leaf.style.left = `${startX}px`;
                leaf.style.top = `${startY}px`;
                leaf.style.opacity = random(.68,.92);
                leaf.style.setProperty("--move-x",`${moveX}px`);
                leaf.style.setProperty("--move-y",`${moveY}px`);
                leaf.style.setProperty("--angle",`${angle}deg`);
                leaf.style.setProperty("--duration",`${duration}s`);
                leaf.style.setProperty("--delay",`${random(0,1.5)}s`);

                fragment.appendChild(leaf);
            }

            skyLeafLayer.appendChild(fragment);
        }

        function dropTreeLeaf(){
            if(!dropStarted || document.hidden) return;

            const heroRect = hero.getBoundingClientRect();
            const treeRect = bgTree.getBoundingClientRect();

            if(!treeRect.width) return;

            const leaf = new Image();
            const startX = random(
                treeRect.left + treeRect.width * .2,
                treeRect.left + treeRect.width * .78
            ) - heroRect.left;

            const startY = random(
                treeRect.top + treeRect.height * .04,
                treeRect.top + treeRect.height * .3
            ) - heroRect.top;

            const fall = Math.max(80,heroRect.height - 20 - startY);
            const fade = clamp((heroRect.height - 95 - startY) / fall,.18,.92);
            const drift = random(-35,35);
            const rotation = random(-25,25);

            leaf.className = "tree-falling-leaf";
            leaf.src = "folhaprisma.png?v=1";
            leaf.alt = "";
            leaf.style.left = `${startX}px`;
            leaf.style.top = `${startY}px`;

            treeLeafLayer.appendChild(leaf);

            const animation = leaf.animate([
                {opacity:0,transform:"translate3d(0,0,0) rotate(0deg)",offset:0},
                {opacity:1,transform:`translate3d(${drift * .08}px,${fall * .08}px,0) rotate(${rotation * .08}deg)`,offset:.08},
                {opacity:1,transform:`translate3d(${drift * fade}px,${fall * fade}px,0) rotate(${rotation * fade}deg)`,offset:fade},
                {opacity:0,transform:`translate3d(${drift}px,${fall}px,0) rotate(${rotation}deg)`,offset:1}
            ],{
                duration:random(2600,3600),
                easing:"linear",
                fill:"forwards"
            });

            animation.onfinish = () => leaf.remove();
        }

        document.addEventListener("visibilitychange",() => {
            if(document.hidden || !musicStarted || dropStarted) return;

            cancelAnimationFrame(textFrame);
            renderMusicText(typingRun);
        });

        function resetButtons(){
            buttons.forEach(button => {
                button.classList.remove("active");
                button.querySelector("img").src = button.dataset.normal;
            });
        }

        buttons.forEach(button => {
            button.addEventListener("click",event => {
                event.preventDefault();
                playSound(selectSound);
                resetButtons();

                button.classList.add("active");
                button.querySelector("img").src = button.dataset.active;
            });
        });

        homeButton.addEventListener("click",event => {
            event.preventDefault();
            playSound(homeSound);
            resetButtons();
            startHomeSequence();
        });

        function openProfile(){
            lastFocusedElement = document.activeElement;
            playSound(selectSound);

            profileOverlay.classList.add("open");
            profileOverlay.setAttribute("aria-hidden","false");
            profileButton.setAttribute("aria-expanded","true");
            document.body.classList.add("profile-open");
            profileClose.focus();
        }

        function closeProfile(){
            profileOverlay.classList.remove("open");
            profileOverlay.setAttribute("aria-hidden","true");
            profileButton.setAttribute("aria-expanded","false");
            document.body.classList.remove("profile-open");
            lastFocusedElement?.focus();
        }

        profileButton.addEventListener("click",openProfile);
        profileClose.addEventListener("click",closeProfile);

        profileOverlay.addEventListener("click",event => {
            if(event.target === profileOverlay) closeProfile();
        });

        document.addEventListener("keydown",event => {
            if(event.key === "Escape" && profileOverlay.classList.contains("open")){
                closeProfile();
            }
        });

        function setVolume(value){
            volumePercent = clamp(Math.round(value),0,100);

            if(musicStarted){
                bgMusic.volume = volumePercent / 100;
            }

            const position = volumePercent * 2;

            volumeSlider.style.setProperty("--fill-width",`${position}px`);
            volumeSlider.style.setProperty("--knob-left",`${position + 6}px`);
            volumeSlider.setAttribute("aria-valuenow",volumePercent);
            volumeSlider.setAttribute("aria-valuetext",`${volumePercent}%`);
            volumeSlider.title = `Volume: ${volumePercent}%`;
            volumeValue.textContent = `${volumePercent}%`;
        }

        function setVolumeFromPointer(event){
            const rect = volumeTrack.getBoundingClientRect();

            setVolume((event.clientX - rect.left) / rect.width * 100);
        }

        volumeSlider.addEventListener("pointerdown",event => {
            event.preventDefault();

            draggingVolume = true;
            volumeSlider.classList.add("is-active");
            volumeSlider.setPointerCapture(event.pointerId);
            setVolumeFromPointer(event);
        });

        volumeSlider.addEventListener("pointermove",event => {
            if(draggingVolume) setVolumeFromPointer(event);
        });

        function stopVolumeDrag(event){
            if(!draggingVolume) return;

            draggingVolume = false;
            volumeSlider.classList.remove("is-active");

            if(volumeSlider.hasPointerCapture(event.pointerId)){
                volumeSlider.releasePointerCapture(event.pointerId);
            }
        }

        volumeSlider.addEventListener("pointerup",stopVolumeDrag);
        volumeSlider.addEventListener("pointercancel",stopVolumeDrag);

        volumeSlider.addEventListener("keydown",event => {
            let value = volumePercent;

            if(event.key === "ArrowRight" || event.key === "ArrowUp") value++;
            else if(event.key === "ArrowLeft" || event.key === "ArrowDown") value--;
            else if(event.key === "Home") value = 0;
            else if(event.key === "End") value = 100;
            else return;

            event.preventDefault();
            volumeSlider.classList.add("is-active");
            setVolume(value);
        });

        volumeSlider.addEventListener("keyup",() => volumeSlider.classList.remove("is-active"));
        volumeSlider.addEventListener("blur",() => volumeSlider.classList.remove("is-active"));

        setVolume(INITIAL_VOLUME);
    </script>
</body>
</html>
