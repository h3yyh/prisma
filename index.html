<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISMA</title>
    <link rel="icon" type="image/png" href="PRISMA.png?v=1">
    <link rel="stylesheet" href="style.css?v=18">
</head>
<body>
    <div class="header-wrap" id="headerWrap">
        <header class="topbar">
            <div class="brand-area">
                <a href="#" class="brand-logo" id="homeButton" aria-label="Voltar ao início">
                    <img src="prisma-logo.png" alt="PRISMA">
                </a>
            </div>

            <nav class="menu" aria-label="Menu principal">
                <a href="#" class="menu-image personagens"
                   data-normal="personagens.png?v=2"
                   data-active="personagens-active.png?v=2">
                    <img src="personagens.png?v=2" alt="Personagens">
                </a>

                <a href="#" class="menu-image campanhas"
                   data-normal="campanhas.png?v=2"
                   data-active="campanhas-active.png?v=2">
                    <img src="campanhas.png?v=2" alt="Campanhas">
                </a>

                <a href="#" class="menu-image sistema"
                   data-normal="sistema.png?v=2"
                   data-active="sistema-active.png?v=2">
                    <img src="sistema.png?v=2" alt="Sistema">
                </a>
            </nav>

            <div class="profile" role="img" aria-label="Foto de perfil">
                <img class="profile-photo" src="perfilfotoprisma.png?v=1" alt="">
                <img class="profile-frame" src="perfilprisma.png?v=1" alt="">
            </div>
        </header>

        <div class="line"></div>
    </div>

    <main class="hero">
        <img class="bg-tree" id="bgTree" src="deltarune-tree.gif?v=1" alt="">
        <div class="leaf-layer" id="leafLayer"></div>

        <section class="home-text">
            <h1 id="typeText"></h1>
        </section>

        <div class="volume-control" id="volumeControl">
            <div class="volume-slider"
                 id="volumeSlider"
                 role="slider"
                 tabindex="0"
                 aria-label="Volume da música"
                 aria-valuemin="0"
                 aria-valuemax="100"
                 aria-valuenow="35">

                <div class="volume-track" id="volumeTrack">
                    <img class="volume-bar volume-normal"
                         src="abaixarvolumep.png"
                         alt=""
                         draggable="false">

                    <img class="volume-bar volume-selected"
                         src="abaixarvolume-select.png"
                         alt=""
                         draggable="false">

                    <div class="volume-fill-mask">
                        <img class="volume-bar volume-normal"
                             src="aumentarvolumep.png"
                             alt=""
                             draggable="false">

                        <img class="volume-bar volume-selected"
                             src="aumentarvolume-select.png"
                             alt=""
                             draggable="false">
                    </div>
                </div>

                <img class="volume-knob volume-normal"
                     src="botãovolume.png"
                     alt=""
                     draggable="false">

                <img class="volume-knob volume-selected"
                     src="botãovolume-select.png"
                     alt=""
                     draggable="false">
            </div>
        </div>
    </main>

    <audio id="selectSound" src="sndselectundertale.mp3"></audio>
    <audio id="homeSound" src="snd_saveprisma.mp3"></audio>
    <audio id="bgMusic" src="conexãoprisma.mp3" loop preload="auto"></audio>

    <script>
        const headerWrap = document.getElementById("headerWrap");
        const buttons = document.querySelectorAll(".menu-image");
        const homeButton = document.getElementById("homeButton");
        const typeText = document.getElementById("typeText");

        const selectSound = document.getElementById("selectSound");
        const homeSound = document.getElementById("homeSound");
        const bgMusic = document.getElementById("bgMusic");

        const volumeControl = document.getElementById("volumeControl");
        const volumeSlider = document.getElementById("volumeSlider");
        const volumeTrack = document.getElementById("volumeTrack");

        selectSound.volume = 0.25;
        homeSound.volume = 0.25;

        const homeMessage = [
            { text: "Tá tão...", speed: 35, pauseAfter: 1000 },
            {
                text: " fri",
                speed: 120,
                effect: "cold",
                startMusicAt: 1
            },
            { text: "o", speed: 90, effect: "cold" },
            { text: ".\n\n", speed: 70, pauseAfter: 500 },
            { text: "...\n\n", speed: 330, pauseAfter: 1000 },
            { text: "Já já vai começar de novo.\n\n", speed: 35, pauseAfter: 700 },
            { text: "...\n\n", speed: 330, pauseAfter: 1000 },
            { text: "Eu vou pegar um casaco.\n\n", speed: 35, pauseAfter: 400 },
            { text: "Você quer vir comigo?", speed: 35 }
        ];

        let typingRun = 0;
        let musicRequested = false;
        let musicPlayPromise = null;
        let volumePercent = 35;
        let draggingVolume = false;

        const wait = ms =>
            new Promise(resolve => setTimeout(resolve, ms));

        function play(sound) {
            sound.currentTime = 0;
            sound.play().catch(() => {});
        }

        function tryStartMusic() {
            if (!musicRequested || !bgMusic.paused || musicPlayPromise) return;

            musicPlayPromise = bgMusic.play()
                .catch(() => {})
                .finally(() => {
                    musicPlayPromise = null;
                });
        }

        function startMusicAndVolume() {
            if (!musicRequested) {
                musicRequested = true;
                volumeControl.classList.add("visible");
            }

            tryStartMusic();
        }

        async function startTypewriter() {
            const currentRun = ++typingRun;
            typeText.innerHTML = "";

            for (const block of homeMessage) {
                if (currentRun !== typingRun) return;

                for (let index = 0; index < block.text.length; index++) {
                    if (currentRun !== typingRun) return;

                    if (block.startMusicAt === index) {
                        startMusicAndVolume();
                    }

                    const char = block.text[index];

                    if (char === "\n") {
                        typeText.appendChild(document.createElement("br"));
                    } else {
                        const letter = document.createElement("span");

                        letter.className =
                            `typed-letter ${block.effect || "normal"}`;

                        letter.textContent =
                            char === " " ? "\u00A0" : char;

                        typeText.appendChild(letter);
                    }

                    await wait(block.speed || 45);
                }

                if (block.pauseAfter) {
                    await wait(block.pauseAfter);
                }
            }
        }

        function resetButtons() {
            buttons.forEach(button => {
                button.classList.remove("active");
                button.querySelector("img").src = button.dataset.normal;
            });
        }

        headerWrap.addEventListener("animationend", event => {
            if (event.target !== headerWrap ||
                event.animationName !== "headerDrop") return;

            headerWrap.classList.add("ready");
            setTimeout(startTypewriter, 1000);
        });

        buttons.forEach(button => {
            button.addEventListener("click", event => {
                event.preventDefault();

                play(selectSound);
                resetButtons();

                button.classList.add("active");
                button.querySelector("img").src = button.dataset.active;
            });
        });

        homeButton.addEventListener("click", event => {
            event.preventDefault();

            play(homeSound);
            resetButtons();
            startTypewriter();
        });

        function setVolume(value) {
            volumePercent = Math.max(
                0,
                Math.min(100, Math.round(value))
            );

            bgMusic.volume = volumePercent / 100;

            volumeSlider.style.setProperty(
                "--fill-width",
                `${volumePercent}px`
            );

            volumeSlider.style.setProperty(
                "--knob-left",
                `${volumePercent + 3}px`
            );

            volumeSlider.setAttribute(
                "aria-valuenow",
                volumePercent
            );

            volumeSlider.setAttribute(
                "aria-valuetext",
                `${volumePercent}%`
            );

            volumeSlider.title =
                `Volume: ${volumePercent}%`;
        }

        function setVolumeFromPointer(event) {
            const trackRect = volumeTrack.getBoundingClientRect();

            const position =
                (event.clientX - trackRect.left) /
                trackRect.width;

            setVolume(position * 100);
        }

        volumeSlider.addEventListener("pointerdown", event => {
            event.preventDefault();

            draggingVolume = true;
            volumeSlider.classList.add("is-active");
            volumeSlider.setPointerCapture(event.pointerId);

            setVolumeFromPointer(event);
            tryStartMusic();
        });

        volumeSlider.addEventListener("pointermove", event => {
            if (!draggingVolume) return;
            setVolumeFromPointer(event);
        });

        function stopVolumeDrag(event) {
            if (!draggingVolume) return;

            draggingVolume = false;
            volumeSlider.classList.remove("is-active");

            if (volumeSlider.hasPointerCapture(event.pointerId)) {
                volumeSlider.releasePointerCapture(event.pointerId);
            }
        }

        volumeSlider.addEventListener("pointerup", stopVolumeDrag);
        volumeSlider.addEventListener("pointercancel", stopVolumeDrag);

        volumeSlider.addEventListener("keydown", event => {
            let nextVolume = volumePercent;

            if (event.key === "ArrowRight" ||
                event.key === "ArrowUp") {
                nextVolume++;
            } else if (
                event.key === "ArrowLeft" ||
                event.key === "ArrowDown"
            ) {
                nextVolume--;
            } else if (event.key === "Home") {
                nextVolume = 0;
            } else if (event.key === "End") {
                nextVolume = 100;
            } else {
                return;
            }

            event.preventDefault();

            volumeSlider.classList.add("is-active");
            setVolume(nextVolume);
            tryStartMusic();
        });

        volumeSlider.addEventListener("keyup", () => {
            volumeSlider.classList.remove("is-active");
        });

        volumeSlider.addEventListener("blur", () => {
            volumeSlider.classList.remove("is-active");
        });

        document.addEventListener("pointerdown", tryStartMusic);
        document.addEventListener("keydown", tryStartMusic);

        setVolume(volumePercent);

        const hero = document.querySelector(".hero");
        const bgTree = document.getElementById("bgTree");
        const leafLayer = document.getElementById("leafLayer");

        const randomBetween = (min, max) =>
            Math.random() * (max - min) + min;

        const clamp = (value, min, max) =>
            Math.max(min, Math.min(max, value));

        function dropLeaf() {
            const heroRect = hero.getBoundingClientRect();
            const treeRect = bgTree.getBoundingClientRect();

            if (!treeRect.width || !treeRect.height) return;

            const leaf = document.createElement("img");

            const startX = randomBetween(
                treeRect.left + treeRect.width * 0.20,
                treeRect.left + treeRect.width * 0.78
            ) - heroRect.left;

            const startY = randomBetween(
                treeRect.top + treeRect.height * 0.04,
                treeRect.top + treeRect.height * 0.30
            ) - heroRect.top;

            const totalFall = Math.max(
                80,
                heroRect.height - 20 - startY
            );

            const fadeOffset = clamp(
                (heroRect.height - 95 - startY) / totalFall,
                0.18,
                0.92
            );

            const drift = randomBetween(-35, 35);
            const rotation = randomBetween(-25, 25);

            leaf.className = "falling-leaf";
            leaf.src = "folhaprisma.png?v=1";
            leaf.alt = "";
            leaf.style.left = `${startX}px`;
            leaf.style.top = `${startY}px`;

            leafLayer.appendChild(leaf);

            const animation = leaf.animate(
                [
                    {
                        opacity: 0,
                        transform: "translate(0, 0) rotate(0deg)",
                        offset: 0
                    },
                    {
                        opacity: 1,
                        transform: `translate(${drift * 0.08}px, ${totalFall * 0.08}px) rotate(${rotation * 0.08}deg)`,
                        offset: 0.08
                    },
                    {
                        opacity: 1,
                        transform: `translate(${drift * fadeOffset}px, ${totalFall * fadeOffset}px) rotate(${rotation * fadeOffset}deg)`,
                        offset: fadeOffset
                    },
                    {
                        opacity: 0,
                        transform: `translate(${drift}px, ${totalFall}px) rotate(${rotation}deg)`,
                        offset: 1
                    }
                ],
                {
                    duration: randomBetween(2600, 3600),
                    easing: "linear",
                    fill: "forwards"
                }
            );

            animation.onfinish = () => leaf.remove();
        }

        setInterval(dropLeaf, 3500);
    </script>
</body>
</html>
