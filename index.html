<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISMA</title>

    <link rel="icon" type="image/png" href="PRISMA.png?v=1">
    <link rel="stylesheet" href="style.css?v=9">
</head>

<body>

<header class="topbar">

    <div class="brand-area">
        <a href="#" class="brand-logo" id="homeButton">
            <img src="prisma-logo.png" alt="PRISMA">
        </a>
    </div>

    <nav class="menu">

        <a
            href="#"
            class="menu-image personagens"
            data-normal="personagens.png"
            data-active="personagens-active.png">

            <img src="personagens.png" alt="Personagens">

        </a>

        <a
            href="#"
            class="menu-image campanhas"
            data-normal="campanhas.png"
            data-active="campanhas-active.jpg">

            <img src="campanhas.png" alt="Campanhas">

        </a>

        <a
            href="#"
            class="menu-image sistema"
            data-normal="sistema.jpg"
            data-active="sistema-active.png">

            <img src="sistema.jpg" alt="Sistema">

        </a>

    </nav>

    <div class="profile"></div>

</header>

<div class="line"></div>

<main class="hero">

    <section class="home-text">
        <h1 id="typeText"></h1>
    </section>

</main>

<audio id="selectSound" src="sndselectundertale.mp3"></audio>
<audio id="homeSound" src="snd_saveprisma.mp3"></audio>

<script>

/* ========================= */
/* BOTÕES E SONS */
/* ========================= */

const buttons = document.querySelectorAll(".menu-image");

const selectSound = document.getElementById("selectSound");
const homeSound = document.getElementById("homeSound");

selectSound.volume = 0.25;
homeSound.volume = 0.25;

const homeButton = document.getElementById("homeButton");

/* ========================= */
/* TEXTO ANIMADO */
/* ========================= */

const typeText = document.getElementById("typeText");

/*
    ONDE VOCÊ MEXE NO TEXTO:

    text: texto que vai aparecer
    speed: velocidade de cada letra
           menor = mais rápido
           maior = mais lento

    effect:
        "normal" = texto branco normal
        "cold" = degradê azul/branco
        "red" = degradê vermelho
        "violet" = degradê roxo

    pauseBefore: espera antes do trecho começar
    pauseAfter: espera depois do trecho terminar
*/

const homeMessage = [
    {
        text: "Tá tão ",
        speed: 45,
        effect: "normal"
    },

    {
        text: "frio",
        speed: 130,
        effect: "cold",
        pauseAfter: 500
    },

    {
        text: ".\n\n",
        speed: 45,
        effect: "normal",
        pauseAfter: 700
    },

    {
        text: "...\n\n",
        speed: 180,
        effect: "normal",
        pauseAfter: 900
    },

    {
        text: "Já já vai começar de novo.\n\n",
        speed: 50,
        effect: "normal",
        pauseAfter: 650
    },

    {
        text: "...\n\n",
        speed: 180,
        effect: "normal",
        pauseAfter: 900
    },

    {
        text: "Eu vou pegar um casaco.\n\n",
        speed: 50,
        effect: "normal",
        pauseAfter: 600
    },

    {
        text: "Você quer vir comigo?",
        speed: 65,
        effect: "violet"
    }
];

let typingRun = 0;

function wait(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function startTypewriter(){

    typingRun++;
    const currentRun = typingRun;

    typeText.innerHTML = "";

    for(const block of homeMessage){

        if(currentRun !== typingRun) return;

        if(block.pauseBefore){
            await wait(block.pauseBefore);
        }

        for(const char of block.text){

            if(currentRun !== typingRun) return;

            if(char === "\n"){
                typeText.appendChild(document.createElement("br"));
            }else{
                const letter = document.createElement("span");

                letter.classList.add("typed-letter");
                letter.classList.add(block.effect || "normal");

                if(char === " "){
                    letter.innerHTML = "&nbsp;";
                }else{
                    letter.textContent = char;
                }

                typeText.appendChild(letter);
            }

            await wait(block.speed || 45);
        }

        if(block.pauseAfter){
            await wait(block.pauseAfter);
        }
    }
}

startTypewriter();

/* ========================= */
/* CLIQUE NAS ABAS */
/* ========================= */

buttons.forEach(button => {

    button.addEventListener("click", function(e){

        e.preventDefault();

        selectSound.currentTime = 0;
        selectSound.play();

        buttons.forEach(item => {

            item.classList.remove("active");

            item.querySelector("img").src = item.dataset.normal;

        });

        this.classList.add("active");

        this.querySelector("img").src = this.dataset.active;

    });

});

/* ========================= */
/* CLIQUE NO PRISMA */
/* ========================= */

homeButton.addEventListener("click", function(e){

    e.preventDefault();

    homeSound.currentTime = 0;
    homeSound.play();

    buttons.forEach(item => {

        item.classList.remove("active");

        item.querySelector("img").src = item.dataset.normal;

    });

    startTypewriter();

});

</script>

</body>
</html>
