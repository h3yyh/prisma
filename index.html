<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>PRISMA</title>
    <link rel="icon" type="image/png" href="PRISMA.png?v=1">
    <link rel="stylesheet" href="style.css?v=32">
</head>
<body>
    <div class="start-screen" id="startScreen">
        <button class="start-logo-button" id="startButton" type="button" aria-label="Entrar no Prisma">
            <img src="prisma-logo.png" alt="PRISMA">
        </button>
    </div>

    <div class="header-wrap" id="headerWrap">
        <header class="topbar">
            <div class="brand-area">
                <a class="brand-logo" id="homeButton" href="#" aria-label="Voltar ao início">
                    <img src="prisma-logo.png" alt="PRISMA">
                </a>
            </div>

            <nav class="menu" aria-label="Menu principal">
                <a class="menu-image personagens" href="#" data-normal="personagens.png?v=2" data-active="personagens-active.png?v=2">
                    <img src="personagens.png?v=2" alt="Personagens">
                </a>

                <a class="menu-image campanhas" href="#" data-normal="campanhas.png?v=2" data-active="campanhas-active.png?v=2">
                    <img src="campanhas.png?v=2" alt="Campanhas">
                </a>

                <a class="menu-image sistema" href="#" data-normal="sistema.png?v=2" data-active="sistema-active.png?v=2">
                    <img src="sistema.png?v=2" alt="Sistema">
                </a>
            </nav>

            <button class="profile" id="profileButton" type="button" aria-label="Abrir perfil" aria-controls="profileOverlay" aria-expanded="false">
                <img class="profile-photo" src="perfilfotoprisma.png?v=1" alt="">
                <img class="profile-frame" src="perfilprisma.png?v=1" alt="">
            </button>
        </header>

        <div class="line"></div>
    </div>

    <main class="hero">
        <div class="sky-leaf-layer" id="skyLeafLayer"></div>
        <img class="bg-tree" id="bgTree" src="deltarune-tree.gif?v=1" alt="">
        <div class="tree-leaf-layer" id="treeLeafLayer"></div>

        <section class="home-text">
            <h1 id="typeText"></h1>
        </section>
    </main>

    <div class="profile-overlay" id="profileOverlay" aria-hidden="true">
        <section class="profile-panel" role="dialog" aria-modal="true" aria-labelledby="profileTitle">
            <button class="profile-close" id="profileClose" type="button" aria-label="Fechar perfil">X</button>
            <h2 id="profileTitle">PERFIL</h2>

            <div class="profile-panel-user">
                <div class="profile-panel-avatar">
                    <img class="profile-photo" src="perfilfotoprisma.png?v=1" alt="">
                    <img class="profile-frame" src="perfilprisma.png?v=1" alt="">
                </div>

                <div>
                    <h3>USUÁRIO</h3>
                    <p>Este espaço poderá mostrar o nome e a descrição do perfil.</p>
                </div>
            </div>

            <div class="profile-panel-info">
                <p><span>STATUS</span> EM DESENVOLVIMENTO</p>
                <p><span>CAMPANHAS</span> 0</p>
                <p><span>PERSONAGENS</span> 0</p>
            </div>

            <div class="profile-volume">
                <div class="profile-volume-label">
                    <span>VOLUME</span>
                    <output id="volumeValue">35%</output>
                </div>

                <div class="volume-slider" id="volumeSlider" role="slider" tabindex="0" aria-label="Volume da música" aria-valuemin="0" aria-valuemax="100" aria-valuenow="35">
                    <div class="volume-track" id="volumeTrack">
                        <img class="volume-bar volume-normal" src="abaixarvolumep.png" alt="" draggable="false">
                        <img class="volume-bar volume-selected" src="abaixarvolume-select.png" alt="" draggable="false">

                        <div class="volume-fill-mask">
                            <img class="volume-bar volume-normal" src="aumentarvolumep.png" alt="" draggable="false">
                            <img class="volume-bar volume-selected" src="aumentarvolume-select.png" alt="" draggable="false">
                        </div>
                    </div>

                    <img class="volume-knob volume-normal" src="botãovolume.png" alt="" draggable="false">
                    <img class="volume-knob volume-selected" src="botãovolume-select.png" alt="" draggable="false">
                </div>
            </div>
        </section>
    </div>

    <audio id="selectSound" src="sndselectundertale.mp3"></audio>
    <audio id="homeSound" src="snd_saveprisma.mp3"></audio>
    <audio id="openSound" src="prismabrindo.mp3"></audio>
    <audio id="bgMusic" src="conexãoprisma.mp3" loop preload="auto"></audio>

    <script>
        const $ = id => document.getElementById(id);

        const startScreen = $("startScreen");
        const startButton = $("startButton");
        const headerWrap = $("headerWrap");
        const homeButton = $("homeButton");
        const typeText = $("typeText");
        const profileButton = $("profileButton");
        const profileOverlay = $("profileOverlay");
        const profileClose = $("profileClose");
        const selectSound = $("selectSound");
        const homeSound = $("homeSound");
        const openSound = $("openSound");
        const bgMusic = $("bgMusic");
        const volumeSlider = $("volumeSlider");
        const volumeTrack = $("volumeTrack");
        const volumeValue = $("volumeValue");
        const bgTree = $("bgTree");
        const skyLeafLayer = $("skyLeafLayer");
        const treeLeafLayer = $("treeLeafLayer");
        const hero = document.querySelector(".hero");
        const buttons = document.querySelectorAll(".menu-image");

        const FIRST_NOTE_TIME = .8373;
        const DROP_TIME = 14.582;
        const TEXT_DURATION = (DROP_TIME - FIRST_NOTE_TIME) * 1000;
        const INITIAL_VOLUME = 35;
        const MAX_SKY_LEAVES = 20;
        const SKY_LANES = 10;
        const SKY_BURST = 12;

        const skyLeafSprites = [
            "folha1.png",
            "folha2.png",
            "folha3.png",
            "folha4.png"
        ];

        let typingRun = 0;
        let currentLine;
        let musicStarted = false;
        let dropStarted = false;
        let musicIndex = 0;
        let textFrame = 0;
        let treeLeafTimer = 0;
        let skyLeafTimer = 0;
        let skyLanePool = [];
        let volumePercent = INITIAL_VOLUME;
        let draggingVolume = false;
        let lastFocusedElement;

        selectSound.volume = homeSound.volume = .25;
        openSound.volume = .35;

        const musicBlocks = [
            {text:"rio",speed:90,effect:"cold"},
            {text:".\n\n",speed:70,pause:500},
            {text:"...\n\n",speed:330,pause:1000},
            {text:"Já já vai começar de novo.\n\n",speed:35,pause:700},
            {text:"...\n\n",speed:330,pause:1000},
            {text:"Eu vou pegar um casaco.\n\n",speed:35,pause:400},
            {text:"Você quer vir comigo?",speed:35}
        ];

        function createTimeline(){
            const events = [];
            let time = 0;

            for(const block of musicBlocks){
                for(const char of block.text){
                    time += block.speed;

                    events.push({
                        time,
                        char,
                        effect:block.effect || "normal"
                    });
                }

                time += block.pause || 0;
            }

            const scale =
                TEXT_DURATION /
                events[events.length - 1].time;

            return events.map(event => ({
                ...event,
                time:event.time * scale
            }));
        }

        const musicEvents = createTimeline();
        const wait = ms => new Promise(resolve => setTimeout(resolve,ms));
        const frame = () => new Promise(resolve => requestAnimationFrame(resolve));
        const random = (min,max) => Math.random() * (max - min) + min;
        const clamp = (value,min,max) => Math.max(min,Math.min(max,value));

        function createTextLine(){
            currentLine = document.createElement("span");
            currentLine.className = "typed-line";
            typeText.appendChild(currentLine);
        }

        function resetText(){
            typeText.replaceChildren();
            createTextLine();
        }

        function appendCharacter(char,effect="normal"){
            if(char === "\n"){
                createTextLine();
                return;
            }

            const letter = document.createElement("span");

            letter.className = `typed-letter ${effect}`;
            letter.textContent = char === " " ? "\u00a0" : char;

            currentLine.appendChild(letter);
        }

        function playSound(sound){
            sound.currentTime = 0;
            sound.play().catch(() => {});
        }

        async function beginExperience(){
            if(document.body.classList.contains("started")){
                return;
            }

            startButton.disabled = true;
            playSound(openSound);
            bgMusic.volume = 0;

            try{
                bgMusic.currentTime = 0;
                await bgMusic.play();
                bgMusic.pause();
                bgMusic.currentTime = 0;
            }catch{}

            document.body.classList.add("started");
            startScreen.classList.add("leaving");

            setTimeout(() => startScreen.remove(),400);
        }

        startButton.addEventListener("click",beginExperience);

        headerWrap.addEventListener("animationend",event => {
            if(
                event.target !== headerWrap ||
                event.animationName !== "headerDrop"
            ){
                return;
            }

            headerWrap.classList.add("ready");
            setTimeout(startHomeSequence,1000);
        });

        function stopCurrentSequence(){
            typingRun++;
            musicStarted = false;
            dropStarted = false;
            musicIndex = 0;
            skyLanePool = [];

            cancelAnimationFrame(textFrame);
            clearTimeout(treeLeafTimer);
            clearTimeout(skyLeafTimer);

            document.body.classList.remove("drop-live");

            skyLeafLayer.replaceChildren();
            treeLeafLayer.replaceChildren();

            bgMusic.pause();
            bgMusic.volume = 0;

            try{
                bgMusic.currentTime = 0;
            }catch{}
        }

        function startHomeSequence(){
            stopCurrentSequence();
            typePrelude(typingRun);
        }

        async function typePrelude(run){
            resetText();

            for(const char of "Tá tão..."){
                if(run !== typingRun){
                    return;
                }

                appendCharacter(char);
                await wait(35);
            }

            await wait(1120);

            if(run === typingRun){
                startMusicSequence(run);
            }
        }

        function waitForAudio(eventName,timeout=1200){
            return new Promise(resolve => {
                let timer;

                const finish = () => {
                    clearTimeout(timer);
                    bgMusic.removeEventListener(eventName,finish);
                    resolve();
                };

                timer = setTimeout(finish,timeout);
                bgMusic.addEventListener(eventName,finish,{once:true});
            });
        }

        async function prepareMusic(){
            bgMusic.pause();
            bgMusic.volume = 0;

            if(bgMusic.readyState < 1){
                await waitForAudio("loadedmetadata");
            }

            try{
                bgMusic.currentTime = 0;
            }catch{}

            if(bgMusic.seeking){
                await waitForAudio("seeked",700);
            }
        }

        async function waitForMusicTime(target,run){
            while(
                run === typingRun &&
                !bgMusic.paused
            ){
                const remaining =
                    target -
                    bgMusic.currentTime;

                if(remaining <= 0){
                    return true;
                }

                if(remaining > .06){
                    await wait((remaining - .03) * 1000);
                }else{
                    await frame();
                }
            }

            return false;
        }

        async function startMusicSequence(run){
            await prepareMusic();

            if(run !== typingRun){
                return;
            }

            bgMusic.volume =
                volumePercent / 100;

            try{
                await bgMusic.play();
            }catch{
                return;
            }

            if(run !== typingRun){
                bgMusic.pause();
                return;
            }

            musicStarted = true;
            musicIndex = 0;

            const firstNoteReached =
                await waitForMusicTime(
                    FIRST_NOTE_TIME,
                    run
                );

            if(
                !firstNoteReached ||
                run !== typingRun
            ){
                return;
            }

            appendCharacter(" ");
            appendCharacter("f","cold");

            renderMusicText(run);
        }

        function renderMusicText(run){
            if(
                !musicStarted ||
                run !== typingRun
            ){
                return;
            }

            const elapsed =
                Math.max(
                    0,
                    bgMusic.currentTime -
                    FIRST_NOTE_TIME
                ) * 1000;

            while(
                musicIndex < musicEvents.length &&
                musicEvents[musicIndex].time <= elapsed
            ){
                const event =
                    musicEvents[musicIndex++];

                appendCharacter(
                    event.char,
                    event.effect
                );
            }

            if(
                !dropStarted &&
                musicIndex === musicEvents.length &&
                bgMusic.currentTime >= DROP_TIME
            ){
                triggerDrop();
            }

            if(
                musicIndex < musicEvents.length ||
                !dropStarted
            ){
                textFrame =
                    requestAnimationFrame(
                        () => renderMusicText(run)
                    );
            }
        }

        function triggerDrop(){
            if(dropStarted){
                return;
            }

            dropStarted = true;

            slideTextToLeft();
            startTreeLeaves();
            startSkyLeaves();
        }

        function slideTextToLeft(){
            const lines = [
                ...typeText.querySelectorAll(".typed-line")
            ];

            const oldLeft = lines.map(
                line => line.getBoundingClientRect().left
            );

            document.body.classList.add("drop-live");

            lines.forEach((line,index) => {
                const distance =
                    oldLeft[index] -
                    line.getBoundingClientRect().left;

                line.animate(
                    [
                        {
                            transform:
                                `translateX(${distance}px)`
                        },
                        {
                            transform:"translateX(0)"
                        }
                    ],
                    {
                        duration:900,
                        easing:"cubic-bezier(.2,.8,.2,1)",
                        fill:"both"
                    }
                );
            });
        }

        function startTreeLeaves(){
            dropTreeLeaf();
            scheduleTreeLeaf();
        }

        function scheduleTreeLeaf(){
            clearTimeout(treeLeafTimer);

            treeLeafTimer = setTimeout(() => {
                dropTreeLeaf();

                if(dropStarted){
                    scheduleTreeLeaf();
                }
            },random(3000,4100));
        }

        function dropTreeLeaf(){
            if(
                !dropStarted ||
                document.hidden
            ){
                return;
            }

            const heroRect =
                hero.getBoundingClientRect();

            const treeRect =
                bgTree.getBoundingClientRect();

            if(!treeRect.width){
                return;
            }

            const leaf =
                document.createElement("img");

            const startX = random(
                treeRect.left +
                    treeRect.width * .20,
                treeRect.left +
                    treeRect.width * .78
            ) - heroRect.left;

            const startY = random(
                treeRect.top +
                    treeRect.height * .04,
                treeRect.top +
                    treeRect.height * .30
            ) - heroRect.top;

            const fall = Math.max(
                100,
                heroRect.height -
                    20 -
                    startY
            );

            const fade = clamp(
                (
                    heroRect.height -
                    105 -
                    startY
                ) / fall,
                .18,
                .92
            );

            const wind = -random(42,85);
            const rotation = random(-28,28);

            leaf.className =
                "tree-falling-leaf";

            leaf.src =
                "folhaprisma.png?v=1";

            leaf.alt = "";
            leaf.style.left = `${startX}px`;
            leaf.style.top = `${startY}px`;

            treeLeafLayer.appendChild(leaf);

            const animation = leaf.animate(
                [
                    {
                        opacity:0,
                        transform:
                            "translate(0,0) rotate(0deg)",
                        offset:0
                    },
                    {
                        opacity:1,
                        transform:
                            `translate(${wind * .08}px,${fall * .08}px) rotate(${rotation * .08}deg)`,
                        offset:.08
                    },
                    {
                        opacity:1,
                        transform:
                            `translate(${wind * fade}px,${fall * fade}px) rotate(${rotation * fade}deg)`,
                        offset:fade
                    },
                    {
                        opacity:0,
                        transform:
                            `translate(${wind}px,${fall}px) rotate(${rotation}deg)`,
                        offset:1
                    }
                ],
                {
                    duration:random(3300,4500),
                    easing:"linear",
                    fill:"forwards"
                }
            );

            animation.onfinish =
                () => leaf.remove();
        }

        function refillSkyLanes(){
            skyLanePool = Array.from(
                {length:SKY_LANES},
                (_,index) => index
            );

            for(
                let index =
                    skyLanePool.length - 1;
                index > 0;
                index--
            ){
                const other =
                    Math.floor(
                        Math.random() *
                        (index + 1)
                    );

                [
                    skyLanePool[index],
                    skyLanePool[other]
                ] = [
                    skyLanePool[other],
                    skyLanePool[index]
                ];
            }
        }

        function nextSkyLane(){
            if(!skyLanePool.length){
                refillSkyLanes();
            }

            return skyLanePool.pop();
        }

        function createSkyLeaf(){
            if(
                !dropStarted ||
                document.hidden ||
                skyLeafLayer.childElementCount >=
                    MAX_SKY_LEAVES
            ){
                return;
            }

            const width =
                hero.clientWidth;

            const height =
                hero.clientHeight;

            const size =
                random(14,22);

            const laneWidth =
                width / SKY_LANES;

            const lane =
                nextSkyLane();

            const startX = clamp(
                lane * laneWidth +
                random(
                    laneWidth * .15,
                    laneWidth * .85
                ),
                8,
                width - size
            );

            const startY =
                -size -
                random(4,70);

            const wantedWind =
                width *
                random(.18,.30);

            const moveX =
                -Math.min(
                    wantedWind,
                    startX + size
                );

            const moveY =
                height +
                size +
                random(45,110) -
                startY;

            const duration =
                moveY /
                random(88,115) *
                1000;

            const angle =
                random(-30,30);

            const sway =
                random(2.5,6.5);

            const direction =
                Math.random() < .5
                    ? -1
                    : 1;

            const rotationSway =
                random(.5,1.4) *
                direction;

            const keyframe = (
                progress,
                swing,
                turn=0
            ) => ({
                offset:progress,
                transform:
                    `translate(${moveX * progress + swing}px,${moveY * progress}px) rotate(${angle + turn}deg)`
            });

            const leaf =
                document.createElement("img");

            leaf.className = "sky-leaf";

            leaf.src =
                skyLeafSprites[
                    Math.floor(
                        Math.random() *
                        skyLeafSprites.length
                    )
                ];

            leaf.alt = "";

            leaf.style.cssText =
                `width:${size}px;` +
                `left:${startX}px;` +
                `top:${startY}px;` +
                `opacity:${random(.68,.92)}`;

            skyLeafLayer.appendChild(leaf);

            const animation = leaf.animate(
                [
                    keyframe(0,0),
                    keyframe(
                        .12,
                        sway * direction,
                        rotationSway
                    ),
                    keyframe(
                        .27,
                        -sway * .72 * direction,
                        -rotationSway * .72
                    ),
                    keyframe(
                        .44,
                        sway * .46 * direction,
                        rotationSway * .46
                    ),
                    keyframe(
                        .62,
                        -sway * .28 * direction,
                        -rotationSway * .28
                    ),
                    keyframe(
                        .79,
                        sway * .13 * direction,
                        rotationSway * .13
                    ),
                    keyframe(1,0)
                ],
                {
                    duration,
                    easing:"linear",
                    fill:"forwards"
                }
            );

            animation.onfinish =
                () => leaf.remove();
        }

        function startSkyLeaves(){
            refillSkyLanes();
            scheduleSkyLeaf(SKY_BURST);
        }

        function scheduleSkyLeaf(burstLeft=0){
            if(!dropStarted){
                return;
            }

            createSkyLeaf();

            const delay =
                burstLeft > 1
                    ? random(130,240)
                    : random(520,780);

            skyLeafTimer = setTimeout(
                () => scheduleSkyLeaf(
                    Math.max(
                        0,
                        burstLeft - 1
                    )
                ),
                delay
            );
        }

        document.addEventListener(
            "visibilitychange",
            () => {
                if(
                    document.hidden ||
                    !musicStarted ||
                    dropStarted
                ){
                    return;
                }

                cancelAnimationFrame(textFrame);
                renderMusicText(typingRun);
            }
        );

        function resetButtons(){
            buttons.forEach(button => {
                button.classList.remove("active");

                button.querySelector("img").src =
                    button.dataset.normal;
            });
        }

        buttons.forEach(button => {
            button.addEventListener(
                "click",
                event => {
                    event.preventDefault();

                    playSound(selectSound);
                    resetButtons();

                    button.classList.add("active");

                    button.querySelector("img").src =
                        button.dataset.active;
                }
            );
        });

        homeButton.addEventListener(
            "click",
            event => {
                event.preventDefault();

                playSound(homeSound);
                resetButtons();
                startHomeSequence();
            }
        );

        function setProfile(open){
            profileOverlay.classList.toggle(
                "open",
                open
            );

            profileOverlay.setAttribute(
                "aria-hidden",
                String(!open)
            );

            profileButton.setAttribute(
                "aria-expanded",
                String(open)
            );

            document.body.classList.toggle(
                "profile-open",
                open
            );

            if(open){
                profileClose.focus();
            }else{
                lastFocusedElement?.focus();
            }
        }

        profileButton.addEventListener(
            "click",
            () => {
                lastFocusedElement =
                    document.activeElement;

                playSound(selectSound);
                setProfile(true);
            }
        );

        profileClose.addEventListener(
            "click",
            () => setProfile(false)
        );

        profileOverlay.addEventListener(
            "click",
            event => {
                if(event.target === profileOverlay){
                    setProfile(false);
                }
            }
        );

        document.addEventListener(
            "keydown",
            event => {
                if(
                    event.key === "Escape" &&
                    profileOverlay.classList.contains("open")
                ){
                    setProfile(false);
                }
            }
        );

        function setVolume(value){
            volumePercent = clamp(
                Math.round(value),
                0,
                100
            );

            if(musicStarted){
                bgMusic.volume =
                    volumePercent / 100;
            }

            const position =
                volumePercent * 2;

            volumeSlider.style.setProperty(
                "--fill-width",
                `${position}px`
            );

            volumeSlider.style.setProperty(
                "--knob-left",
                `${position + 6}px`
            );

            volumeSlider.setAttribute(
                "aria-valuenow",
                volumePercent
            );

            volumeSlider.setAttribute(
                "aria-valuetext",
                `${volumePercent}%`
            );

            volumeSlider.title =
                `Volume: ${volumePercent}%`;

            volumeValue.textContent =
                `${volumePercent}%`;
        }

        function setVolumeFromPointer(event){
            const rect =
                volumeTrack.getBoundingClientRect();

            setVolume(
                (
                    event.clientX -
                    rect.left
                ) /
                rect.width *
                100
            );
        }

        volumeSlider.addEventListener(
            "pointerdown",
            event => {
                event.preventDefault();

                draggingVolume = true;

                volumeSlider.classList.add(
                    "is-active"
                );

                volumeSlider.setPointerCapture(
                    event.pointerId
                );

                setVolumeFromPointer(event);
            }
        );

        volumeSlider.addEventListener(
            "pointermove",
            event => {
                if(draggingVolume){
                    setVolumeFromPointer(event);
                }
            }
        );

        function stopVolumeDrag(event){
            if(!draggingVolume){
                return;
            }

            draggingVolume = false;

            volumeSlider.classList.remove(
                "is-active"
            );

            if(
                volumeSlider.hasPointerCapture(
                    event.pointerId
                )
            ){
                volumeSlider.releasePointerCapture(
                    event.pointerId
                );
            }
        }

        volumeSlider.addEventListener(
            "pointerup",
            stopVolumeDrag
        );

        volumeSlider.addEventListener(
            "pointercancel",
            stopVolumeDrag
        );

        volumeSlider.addEventListener(
            "keydown",
            event => {
                let value =
                    volumePercent;

                if(
                    event.key === "ArrowRight" ||
                    event.key === "ArrowUp"
                ){
                    value++;
                }else if(
                    event.key === "ArrowLeft" ||
                    event.key === "ArrowDown"
                ){
                    value--;
                }else if(
                    event.key === "Home"
                ){
                    value = 0;
                }else if(
                    event.key === "End"
                ){
                    value = 100;
                }else{
                    return;
                }

                event.preventDefault();

                volumeSlider.classList.add(
                    "is-active"
                );

                setVolume(value);
            }
        );

        ["keyup","blur"].forEach(type => {
            volumeSlider.addEventListener(
                type,
                () => {
                    volumeSlider.classList.remove(
                        "is-active"
                    );
                }
            );
        });

        setVolume(INITIAL_VOLUME);
    </script>
</body>
</html>
